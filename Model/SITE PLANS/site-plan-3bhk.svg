<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FCF8EF"/>
      <stop offset="1" stop-color="#F4ECD8"/>
    </linearGradient>
    <linearGradient id="plant3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2E5339"/>
      <stop offset="1" stop-color="#1F3D2B"/>
    </linearGradient>
    <pattern id="grove3" width="46" height="46" patternUnits="userSpaceOnUse">
      <rect width="46" height="46" fill="url(#plant3)"/>
      <circle cx="13" cy="14" r="8" fill="#3C6E47" opacity="0.6"/>
      <circle cx="34" cy="32" r="7" fill="#4A8056" opacity="0.55"/>
      <circle cx="26" cy="8" r="5" fill="#3C6E47" opacity="0.5"/>
    </pattern>
    <filter id="soft3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#1F3D2B" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1000" height="720" fill="url(#bg3)"/>
  <rect x="26" y="26" width="948" height="668" fill="none" stroke="#C9A227" stroke-width="1.5" opacity="0.55"/>

  <text x="60" y="74" font-size="30" fill="#1F3D2B" font-weight="bold" letter-spacing="0.5">3BHK · Premium Modular Agro Estate</text>
  <text x="60" y="100" font-size="15" fill="#7A6A45" letter-spacing="1.5">RESERVA VERDE GOA · 1-ACRE GROUND-LEVEL CONTAINER ESTATE · 3,500 SQ.FT</text>
  <line x1="60" y1="116" x2="660" y2="116" stroke="#B8924A" stroke-width="1"/>

  <rect x="120" y="150" width="640" height="500" rx="6" fill="#F8F1DF" stroke="#B8924A" stroke-width="2.5"/>
  <rect x="120" y="150" width="640" height="500" rx="6" fill="none" stroke="#1F3D2B" stroke-width="1" stroke-dasharray="3 6" opacity="0.4"/>

  <!-- Entry -->
  <rect x="150" y="600" width="70" height="50" fill="#E8DDC5"/>
  <text x="185" y="672" font-size="13" fill="#7A6A45" text-anchor="middle" font-style="italic">Entry / Driveway</text>

  <!-- L-shaped container home around courtyard -->
  <g filter="url(#soft3)">
    <path d="M180 360 h240 v90 h-150 v140 h-90 Z" fill="#EFE6CE" stroke="#2C2A26" stroke-width="1.5"/>
    <path d="M180 360 h240 v18 h-240 Z" fill="#2E5339"/>
    <line x1="270" y1="360" x2="270" y2="590" stroke="#B49B6A" stroke-width="1"/>
    <line x1="360" y1="360" x2="360" y2="450" stroke="#B49B6A" stroke-width="1"/>
    <text x="300" y="408" font-size="14" fill="#2C2A26" text-anchor="middle" font-weight="bold">3BHK CONTAINER HOME</text>
    <text x="300" y="428" font-size="11" fill="#6B6453" text-anchor="middle">Living · Dining · Family Lounge · Study</text>
    <text x="230" y="520" font-size="11" fill="#6B6453" text-anchor="middle">3 Bed · 3 Bath</text>
    <text x="230" y="538" font-size="11" fill="#6B6453" text-anchor="middle">Kitchen · Utility</text>
  </g>

  <!-- Courtyard inside the L -->
  <rect x="290" y="460" width="130" height="130" rx="4" fill="#E2D2A8" stroke="#B8924A" stroke-width="1.2"/>
  <text x="355" y="518" font-size="13" fill="#6B5A33" text-anchor="middle">Courtyard</text>
  <text x="355" y="536" font-size="11" fill="#6B5A33" text-anchor="middle">+ Outdoor Deck</text>

  <!-- Verandah strip -->
  <rect x="420" y="450" width="120" height="140" rx="4" fill="#EBDFBE" stroke="#B8924A" stroke-width="1"/>
  <text x="480" y="525" font-size="12" fill="#6B5A33" text-anchor="middle">Verandah</text>

  <!-- Plantation block to one side (right + rear) -->
  <rect x="150" y="190" width="580" height="150" rx="6" fill="url(#grove3)" stroke="#1F3D2B" stroke-width="1.5"/>
  <text x="440" y="255" font-size="19" fill="#FBF7EE" text-anchor="middle" font-weight="bold" letter-spacing="2">PLANTATION ESTATE ZONE</text>
  <text x="440" y="280" font-size="13" fill="#D9E7D0" text-anchor="middle">Cashew · Mango · Coconut · Teak + Pepper · Spice Garden</text>
  <rect x="560" y="360" width="170" height="270" rx="6" fill="url(#grove3)" stroke="#1F3D2B" stroke-width="1.5"/>
  <text x="645" y="500" font-size="13" fill="#D9E7D0" text-anchor="middle" transform="rotate(90 645 500)">Mixed Plantation Block</text>

  <circle cx="500" cy="615" r="24" fill="#9FB8C9" stroke="#5C7C8C" stroke-width="1.5"/>
  <text x="500" y="620" font-size="11" fill="#274350" text-anchor="middle">Water</text>

  <g transform="translate(815,170)">
    <circle r="34" fill="#F8F1DF" stroke="#B8924A" stroke-width="1.5"/>
    <path d="M0,-26 L9,8 L0,0 L-9,8 Z" fill="#1F3D2B"/>
    <text y="28" font-size="13" fill="#7A6A45" text-anchor="middle" font-weight="bold">N</text>
  </g>

  <g transform="translate(815,600)">
    <rect width="120" height="8" fill="#1F3D2B"/>
    <rect width="60" height="8" fill="#F8F1DF" stroke="#1F3D2B" stroke-width="1"/>
    <text x="0" y="26" font-size="12" fill="#7A6A45">0</text>
    <text x="110" y="26" font-size="12" fill="#7A6A45">≈ 60 ft</text>
    <text x="0" y="-10" font-size="12" fill="#7A6A45" font-style="italic">Indicative · Not to scale</text>
  </g>

  <g transform="translate(800,300)" font-size="12.5" fill="#4A4231">
    <text x="0" y="-14" font-size="13" fill="#1F3D2B" font-weight="bold">LEGEND</text>
    <rect x="0" y="0" width="16" height="16" fill="url(#grove3)"/><text x="24" y="13">Plantation zone</text>
    <rect x="0" y="26" width="16" height="16" fill="#EFE6CE" stroke="#2C2A26"/><text x="24" y="39">Container home</text>
    <rect x="0" y="52" width="16" height="16" fill="#E2D2A8" stroke="#B8924A"/><text x="24" y="65">Courtyard / deck</text>
    <rect x="0" y="78" width="16" height="16" fill="#9FB8C9" stroke="#5C7C8C"/><text x="24" y="91">Water storage</text>
  </g>
</svg>
