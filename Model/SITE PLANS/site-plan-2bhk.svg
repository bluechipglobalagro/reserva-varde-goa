<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FCF8EF"/>
      <stop offset="1" stop-color="#F4ECD8"/>
    </linearGradient>
    <linearGradient id="plant2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2E5339"/>
      <stop offset="1" stop-color="#1F3D2B"/>
    </linearGradient>
    <pattern id="grove2" width="46" height="46" patternUnits="userSpaceOnUse">
      <rect width="46" height="46" fill="url(#plant2)"/>
      <circle cx="12" cy="12" r="7" fill="#3C6E47" opacity="0.65"/>
      <circle cx="34" cy="30" r="8" fill="#3C6E47" opacity="0.55"/>
      <circle cx="23" cy="40" r="5" fill="#4A8056" opacity="0.5"/>
    </pattern>
    <filter id="soft2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#1F3D2B" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1000" height="720" fill="url(#bg2)"/>
  <rect x="26" y="26" width="948" height="668" fill="none" stroke="#C9A227" stroke-width="1.5" opacity="0.55"/>

  <!-- Title block -->
  <text x="60" y="74" font-size="30" fill="#1F3D2B" font-weight="bold" letter-spacing="0.5">2BHK · Compact Modular Eco Estate</text>
  <text x="60" y="100" font-size="15" fill="#7A6A45" letter-spacing="1.5">RESERVA VERDE GOA · 1-ACRE GROUND-LEVEL CONTAINER ESTATE · 2,500 SQ.FT</text>
  <line x1="60" y1="116" x2="640" y2="116" stroke="#B8924A" stroke-width="1"/>

  <!-- Plot boundary -->
  <rect x="120" y="150" width="640" height="500" rx="6" fill="#F8F1DF" stroke="#B8924A" stroke-width="2.5"/>
  <rect x="120" y="150" width="640" height="500" rx="6" fill="none" stroke="#1F3D2B" stroke-width="1" stroke-dasharray="3 6" opacity="0.4"/>

  <!-- Driveway / entry from front (bottom) -->
  <rect x="350" y="600" width="80" height="50" fill="#E8DDC5"/>
  <path d="M350 600 h80 v50 h-80 Z" fill="none" stroke="#B8924A" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="390" y="672" font-size="13" fill="#7A6A45" text-anchor="middle" font-style="italic">Entry / Driveway</text>

  <!-- Container home near front -->
  <g filter="url(#soft2)">
    <rect x="200" y="470" width="300" height="120" rx="4" fill="#EFE6CE" stroke="#2C2A26" stroke-width="1.5"/>
    <rect x="200" y="470" width="300" height="20" fill="#2E5339"/>
    <line x1="280" y1="470" x2="280" y2="590" stroke="#B49B6A" stroke-width="1"/>
    <line x1="360" y1="470" x2="360" y2="590" stroke="#B49B6A" stroke-width="1"/>
    <line x1="440" y1="470" x2="440" y2="590" stroke="#B49B6A" stroke-width="1"/>
    <text x="350" y="535" font-size="15" fill="#2C2A26" text-anchor="middle" font-weight="bold">2BHK GROUND-LEVEL CONTAINER HOME</text>
    <text x="350" y="556" font-size="12" fill="#6B6453" text-anchor="middle">Living · Dining · Kitchen · 2 Bed · Bath · Utility</text>
  </g>

  <!-- Private deck + courtyard -->
  <rect x="520" y="470" width="120" height="120" rx="4" fill="#E2D2A8" stroke="#B8924A" stroke-width="1.2"/>
  <text x="580" y="525" font-size="13" fill="#6B5A33" text-anchor="middle">Private</text>
  <text x="580" y="543" font-size="13" fill="#6B5A33" text-anchor="middle">Deck</text>

  <!-- Plantation block (rear, large) -->
  <rect x="150" y="190" width="580" height="250" rx="6" fill="url(#grove2)" stroke="#1F3D2B" stroke-width="1.5"/>
  <text x="440" y="305" font-size="20" fill="#FBF7EE" text-anchor="middle" font-weight="bold" letter-spacing="2">PLANTATION ESTATE ZONE</text>
  <text x="440" y="330" font-size="13" fill="#D9E7D0" text-anchor="middle">Cashew · Mango · Coconut · Pepper · Spices · Food Forest</text>

  <!-- Water + solar markers -->
  <circle cx="690" cy="560" r="26" fill="#9FB8C9" stroke="#5C7C8C" stroke-width="1.5"/>
  <text x="690" y="565" font-size="11" fill="#274350" text-anchor="middle">Water</text>
  <rect x="208" y="478" width="284" height="8" fill="#C9A227" opacity="0.85"/>

  <!-- North arrow -->
  <g transform="translate(815,170)">
    <circle r="34" fill="#F8F1DF" stroke="#B8924A" stroke-width="1.5"/>
    <path d="M0,-26 L9,8 L0,0 L-9,8 Z" fill="#1F3D2B"/>
    <text y="28" font-size="13" fill="#7A6A45" text-anchor="middle" font-weight="bold">N</text>
  </g>

  <!-- Scale bar -->
  <g transform="translate(815,600)">
    <rect width="120" height="8" fill="#1F3D2B"/>
    <rect width="60" height="8" fill="#F8F1DF" stroke="#1F3D2B" stroke-width="1"/>
    <text x="0" y="26" font-size="12" fill="#7A6A45">0</text>
    <text x="110" y="26" font-size="12" fill="#7A6A45">≈ 60 ft</text>
    <text x="0" y="-10" font-size="12" fill="#7A6A45" font-style="italic">Indicative · Not to scale</text>
  </g>

  <!-- Legend -->
  <g transform="translate(800,300)" font-size="12.5" fill="#4A4231">
    <text x="0" y="-14" font-size="13" fill="#1F3D2B" font-weight="bold">LEGEND</text>
    <rect x="0" y="0" width="16" height="16" fill="url(#grove2)"/><text x="24" y="13">Plantation zone</text>
    <rect x="0" y="26" width="16" height="16" fill="#EFE6CE" stroke="#2C2A26"/><text x="24" y="39">Container home</text>
    <rect x="0" y="52" width="16" height="16" fill="#E2D2A8" stroke="#B8924A"/><text x="24" y="65">Deck / courtyard</text>
    <rect x="0" y="78" width="16" height="16" fill="#9FB8C9" stroke="#5C7C8C"/><text x="24" y="91">Water storage</text>
  </g>
</svg>
