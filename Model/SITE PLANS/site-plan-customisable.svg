<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <linearGradient id="bgc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FCF8EF"/>
      <stop offset="1" stop-color="#F4ECD8"/>
    </linearGradient>
    <linearGradient id="plantc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2E5339"/>
      <stop offset="1" stop-color="#1F3D2B"/>
    </linearGradient>
    <pattern id="grovec" width="46" height="46" patternUnits="userSpaceOnUse">
      <rect width="46" height="46" fill="url(#plantc)"/>
      <circle cx="13" cy="13" r="8" fill="#3C6E47" opacity="0.55"/>
      <circle cx="34" cy="32" r="7" fill="#4A8056" opacity="0.5"/>
    </pattern>
    <filter id="softc" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#1F3D2B" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1000" height="720" fill="url(#bgc)"/>
  <rect x="26" y="26" width="948" height="668" fill="none" stroke="#C9A227" stroke-width="1.5" opacity="0.55"/>

  <text x="60" y="74" font-size="30" fill="#1F3D2B" font-weight="bold" letter-spacing="0.5">Fully Customisable Modular Eco Estate</text>
  <text x="60" y="100" font-size="15" fill="#7A6A45" letter-spacing="1.5">RESERVA VERDE GOA · 1-ACRE GROUND-LEVEL CONTAINER ESTATE · BUYER-DEFINED</text>
  <line x1="60" y1="116" x2="700" y2="116" stroke="#B8924A" stroke-width="1"/>

  <rect x="120" y="150" width="640" height="500" rx="6" fill="#F8F1DF" stroke="#B8924A" stroke-width="2.5"/>
  <rect x="120" y="150" width="640" height="500" rx="6" fill="none" stroke="#1F3D2B" stroke-width="1" stroke-dasharray="3 6" opacity="0.4"/>

  <!-- Flexible placement footprints (dashed = buyer choice) -->
  <g filter="url(#softc)">
    <rect x="180" y="470" width="200" height="120" rx="4" fill="#EFE6CE" stroke="#2C2A26" stroke-width="1.5"/>
    <rect x="180" y="470" width="200" height="16" fill="#2E5339"/>
    <text x="280" y="528" font-size="13" fill="#2C2A26" text-anchor="middle" font-weight="bold">MODULAR HOME</text>
    <text x="280" y="548" font-size="11" fill="#6B6453" text-anchor="middle">Custom bed count / area</text>
  </g>

  <!-- Alternate placement options (ghost outlines) -->
  <rect x="430" y="200" width="180" height="110" rx="6" fill="none" stroke="#B8924A" stroke-width="1.6" stroke-dasharray="7 6"/>
  <text x="520" y="250" font-size="12" fill="#9A8244" text-anchor="middle">Option: Centre</text>
  <text x="520" y="268" font-size="11" fill="#9A8244" text-anchor="middle">placement</text>

  <rect x="520" y="470" width="180" height="120" rx="6" fill="none" stroke="#B8924A" stroke-width="1.6" stroke-dasharray="7 6"/>
  <text x="610" y="525" font-size="12" fill="#9A8244" text-anchor="middle">Option: Side /</text>
  <text x="610" y="543" font-size="11" fill="#9A8244" text-anchor="middle">courtyard placement</text>

  <rect x="180" y="200" width="180" height="110" rx="6" fill="none" stroke="#B8924A" stroke-width="1.6" stroke-dasharray="7 6"/>
  <text x="270" y="250" font-size="12" fill="#9A8244" text-anchor="middle">Option: Rear</text>
  <text x="270" y="268" font-size="11" fill="#9A8244" text-anchor="middle">privacy placement</text>

  <!-- Expandable module markers -->
  <rect x="388" y="470" width="34" height="120" rx="3" fill="#E2D2A8" stroke="#B8924A" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="405" y="535" font-size="10" fill="#6B5A33" text-anchor="middle" transform="rotate(90 405 535)">+ Module</text>

  <!-- Flexible plantation / deck -->
  <rect x="150" y="330" width="580" height="120" rx="6" fill="url(#grovec)" stroke="#1F3D2B" stroke-width="1.5"/>
  <text x="440" y="380" font-size="17" fill="#FBF7EE" text-anchor="middle" font-weight="bold" letter-spacing="1.5">BUYER-CHOICE PLANTATION ZONE</text>
  <text x="440" y="404" font-size="12" fill="#D9E7D0" text-anchor="middle">Food Forest · Orchard · Timber · Spice · Herbal · Mixed Agro Model</text>

  <!-- Deck / firepit -->
  <circle cx="455" cy="615" r="22" fill="#E2D2A8" stroke="#B8924A" stroke-width="1.2"/>
  <text x="455" y="619" font-size="10" fill="#6B5A33" text-anchor="middle">Firepit</text>
  <rect x="500" y="595" width="120" height="42" rx="4" fill="#EBDFBE" stroke="#B8924A" stroke-width="1"/>
  <text x="560" y="620" font-size="11" fill="#6B5A33" text-anchor="middle">Sit-out / Deck</text>

  <circle cx="690" cy="615" r="22" fill="#9FB8C9" stroke="#5C7C8C" stroke-width="1.5"/>
  <text x="690" y="619" font-size="10" fill="#274350" text-anchor="middle">Water</text>

  <g transform="translate(815,170)">
    <circle r="34" fill="#F8F1DF" stroke="#B8924A" stroke-width="1.5"/>
    <path d="M0,-26 L9,8 L0,0 L-9,8 Z" fill="#1F3D2B"/>
    <text y="28" font-size="13" fill="#7A6A45" text-anchor="middle" font-weight="bold">N</text>
  </g>

  <g transform="translate(815,600)">
    <rect width="120" height="8" fill="#1F3D2B"/>
    <rect width="60" height="8" fill="#F8F1DF" stroke="#1F3D2B" stroke-width="1"/>
    <text x="0" y="26" font-size="12" fill="#7A6A45">0</text>
    <text x="110" y="26" font-size="12" fill="#7A6A45">≈ 60 ft</text>
    <text x="0" y="-10" font-size="12" fill="#7A6A45" font-style="italic">Indicative · Not to scale</text>
  </g>

  <g transform="translate(800,300)" font-size="12" fill="#4A4231">
    <text x="0" y="-14" font-size="13" fill="#1F3D2B" font-weight="bold">LEGEND</text>
    <rect x="0" y="0" width="16" height="16" fill="#EFE6CE" stroke="#2C2A26"/><text x="24" y="13">Selected home</text>
    <rect x="0" y="26" width="16" height="16" fill="none" stroke="#B8924A" stroke-dasharray="4 3"/><text x="24" y="39">Placement options</text>
    <rect x="0" y="52" width="16" height="16" fill="url(#grovec)"/><text x="24" y="65">Plantation zone</text>
    <rect x="0" y="78" width="16" height="16" fill="#9FB8C9" stroke="#5C7C8C"/><text x="24" y="91">Water storage</text>
  </g>
</svg>
