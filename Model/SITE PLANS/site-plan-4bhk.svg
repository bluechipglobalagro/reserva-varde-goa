<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FCF8EF"/>
      <stop offset="1" stop-color="#F4ECD8"/>
    </linearGradient>
    <linearGradient id="plant4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2E5339"/>
      <stop offset="1" stop-color="#1F3D2B"/>
    </linearGradient>
    <pattern id="grove4" width="46" height="46" patternUnits="userSpaceOnUse">
      <rect width="46" height="46" fill="url(#plant4)"/>
      <circle cx="13" cy="13" r="8" fill="#3C6E47" opacity="0.6"/>
      <circle cx="35" cy="33" r="8" fill="#4A8056" opacity="0.55"/>
      <circle cx="25" cy="40" r="5" fill="#3C6E47" opacity="0.5"/>
    </pattern>
    <filter id="soft4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1F3D2B" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="1000" height="720" fill="url(#bg4)"/>
  <rect x="26" y="26" width="948" height="668" fill="none" stroke="#C9A227" stroke-width="1.5" opacity="0.55"/>

  <text x="60" y="74" font-size="30" fill="#1F3D2B" font-weight="bold" letter-spacing="0.5">4BHK · Signature Modular Luxury Estate</text>
  <text x="60" y="100" font-size="15" fill="#7A6A45" letter-spacing="1.5">RESERVA VERDE GOA · 1-ACRE GROUND-LEVEL CONTAINER ESTATE · 4,500 SQ.FT</text>
  <line x1="60" y1="116" x2="690" y2="116" stroke="#B8924A" stroke-width="1"/>

  <rect x="120" y="150" width="640" height="500" rx="6" fill="#F8F1DF" stroke="#B8924A" stroke-width="2.5"/>
  <rect x="120" y="150" width="640" height="500" rx="6" fill="none" stroke="#1F3D2B" stroke-width="1" stroke-dasharray="3 6" opacity="0.4"/>

  <!-- Grand arrival -->
  <rect x="360" y="600" width="160" height="50" fill="#E8DDC5"/>
  <text x="440" y="672" font-size="13" fill="#7A6A45" text-anchor="middle" font-style="italic">Grand Arrival Court · Private Parking</text>

  <!-- Pavilion wings around central courtyard -->
  <g filter="url(#soft4)">
    <!-- North wing: bedrooms -->
    <rect x="250" y="200" width="380" height="90" rx="4" fill="#EFE6CE" stroke="#2C2A26" stroke-width="1.5"/>
    <rect x="250" y="200" width="380" height="16" fill="#2E5339"/>
    <text x="440" y="252" font-size="13" fill="#2C2A26" text-anchor="middle" font-weight="bold">4 BEDROOM WING · ATTACHED BATHS</text>
    <!-- West wing: living -->
    <rect x="250" y="290" width="110" height="230" rx="4" fill="#EFE6CE" stroke="#2C2A26" stroke-width="1.5"/>
    <text x="305" y="400" font-size="12" fill="#2C2A26" text-anchor="middle" font-weight="bold" transform="rotate(-90 305 400)">GRAND LIVING · DINING</text>
    <!-- East wing: kitchen/service -->
    <rect x="520" y="290" width="110" height="230" rx="4" fill="#EFE6CE" stroke="#2C2A26" stroke-width="1.5"/>
    <text x="575" y="405" font-size="12" fill="#2C2A26" text-anchor="middle" font-weight="bold" transform="rotate(90 575 405)">KITCHEN · SERVICE · STUDY</text>
  </g>

  <!-- Central courtyard -->
  <rect x="360" y="290" width="160" height="230" rx="6" fill="#E2D2A8" stroke="#B8924A" stroke-width="1.4"/>
  <circle cx="440" cy="375" r="34" fill="#CFE0C6" stroke="#3C6E47" stroke-width="1.2"/>
  <text x="440" y="380" font-size="12" fill="#2E5339" text-anchor="middle">Wellness</text>
  <text x="440" y="455" font-size="13" fill="#6B5A33" text-anchor="middle">Central Courtyard</text>
  <text x="440" y="473" font-size="11" fill="#6B5A33" text-anchor="middle">+ Large Deck</text>

  <!-- Curated plantation rear + sides -->
  <rect x="150" y="530" width="580" height="100" rx="6" fill="url(#grove4)" stroke="#1F3D2B" stroke-width="1.5"/>
  <text x="440" y="575" font-size="17" fill="#FBF7EE" text-anchor="middle" font-weight="bold" letter-spacing="2">CURATED PLANTATION + WELLNESS GARDEN</text>
  <text x="440" y="598" font-size="12" fill="#D9E7D0" text-anchor="middle">Teak · Black Pepper · Mango · Coconut · Spices · Medicinal Herbs · Coffee</text>
  <rect x="640" y="200" width="90" height="320" rx="6" fill="url(#grove4)" stroke="#1F3D2B" stroke-width="1.5"/>
  <text x="685" y="360" font-size="12" fill="#D9E7D0" text-anchor="middle" transform="rotate(90 685 360)">Biodiversity Buffer</text>

  <circle cx="195" cy="585" r="22" fill="#9FB8C9" stroke="#5C7C8C" stroke-width="1.5"/>
  <text x="195" y="589" font-size="10" fill="#274350" text-anchor="middle">Water</text>

  <g transform="translate(815,170)">
    <circle r="34" fill="#F8F1DF" stroke="#B8924A" stroke-width="1.5"/>
    <path d="M0,-26 L9,8 L0,0 L-9,8 Z" fill="#1F3D2B"/>
    <text y="28" font-size="13" fill="#7A6A45" text-anchor="middle" font-weight="bold">N</text>
  </g>

  <g transform="translate(815,600)">
    <rect width="120" height="8" fill="#1F3D2B"/>
    <rect width="60" height="8" fill="#F8F1DF" stroke="#1F3D2B" stroke-width="1"/>
    <text x="0" y="26" font-size="12" fill="#7A6A45">0</text>
    <text x="110" y="26" font-size="12" fill="#7A6A45">≈ 60 ft</text>
    <text x="0" y="-10" font-size="12" fill="#7A6A45" font-style="italic">Indicative · Not to scale</text>
  </g>

  <g transform="translate(800,290)" font-size="12.5" fill="#4A4231">
    <text x="0" y="-14" font-size="13" fill="#1F3D2B" font-weight="bold">LEGEND</text>
    <rect x="0" y="0" width="16" height="16" fill="url(#grove4)"/><text x="24" y="13">Plantation zone</text>
    <rect x="0" y="26" width="16" height="16" fill="#EFE6CE" stroke="#2C2A26"/><text x="24" y="39">Pavilion wings</text>
    <rect x="0" y="52" width="16" height="16" fill="#E2D2A8" stroke="#B8924A"/><text x="24" y="65">Courtyard / deck</text>
    <rect x="0" y="78" width="16" height="16" fill="#9FB8C9" stroke="#5C7C8C"/><text x="24" y="91">Water storage</text>
  </g>
</svg>
